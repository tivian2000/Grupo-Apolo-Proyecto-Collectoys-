<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../imgs/Favicon.png" type="image/png">
    <title>Reclamaciones</title>
     <style>
            html{ 
                font-family: Arial, Helvetica, sans-serif;
                font-size: 14px;
                font-style: normal;
            }
          </style>
</head>
<body>

    <div align="center">

        <a href="../index.html">
            <img src="../imgs/Logo_Collectoys.png" width="250">
        </a>

        <h2>Libro de Reclamaciones</h2>

        <form action="" method="get">

            <table border="3" cellpadding="12" width="500">

                <tr>
                    <td><b>Nombre completo:</b></td>
                    <td>
                        <input type="text" name="nombre">
                    </td>
                </tr>

                <tr>
                    <td><b>DNI:</b></td>
                    <td>
                        <input type="text" name="dni">
                    </td>
                </tr>

                <tr>
                    <td><b>Correo:</b></td>
                    <td>
                        <input type="text" name="correo">
                    </td>
                </tr>

                <tr>
                    <td><b>Teléfono:</b></td>
                    <td>
                        <input type="text" name="telefono">
                    </td>
                </tr>

                <tr>
                    <td><b>Local:</b></td>
                    <td>
                        <select name="local">
                            <option>Lima</option>
                            <option>Arequipa</option>
                            <option>Trujillo</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><b>Tipo:</b></td>
                    <td>
                        <select name="tipo">
                            <option>Reclamo</option>
                            <option>Queja</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><b>Detalle del reclamo:</b></td>
                    <td>
                        <textarea name="detalle" rows="5" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td><b>Pedido del cliente:</b></td>
                    <td>
                        <textarea name="pedido" rows="4" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Enviar Reclamo">
                    </td>
                </tr>

            </table>

        </form>

    </div>

</body>
</html>
