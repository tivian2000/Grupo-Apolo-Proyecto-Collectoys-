<body>

Etiquetas de Estructura (El Esqueleto)
Estas definen las secciones principales de tu página.

<html>: El contenedor raíz de todo el documento.

<head>: Información "invisible" para el navegador (título, links a CSS).

<body>: Todo el contenido que el usuario sí ve.

<header>: Encabezado de la página o de una sección.

<nav>: Contenedor de los menús de navegación.

<main>: El contenido principal y único del documento.

<section>: Grupos de contenido relacionado.

<article>: Contenido independiente (como un post de blog).

<aside>: Contenido lateral o indirecto (publicidad, barras laterales).

<footer>: Pie de página.

<div>: Contenedor de bloque genérico (el "comodín").

------------------------------------------------------------------------   

Etiquetas de Texto y Contenido
<h1> a <h6>: Encabezados (del más importante al menos).

<p>: Párrafo.

<ul> / <ol> / <li>: Listas desordenadas, ordenadas y sus elementos.

<a>: Enlace o hipervínculo.

<strong>: Texto en negrita (importante).

<em>: Texto en cursiva (énfasis).

<span>: Contenedor de texto en línea (para dar estilo a una sola palabra).

<br>: Salto de línea.

<hr>: Línea horizontal divisoria.    

--------------------------------------------------------------------------


Etiquetas Multimedia y Formularios
<img>: Insertar imágenes.

<video> / <audio>: Reproducción de video y sonido.

<iframe>: Incrustar otra página (como un mapa de Google o video de YouTube).

<form>: Crear un formulario.

<input>: Campo de entrada de datos (texto, clave, checkbox).

<button>: Botón clickeable.

<label>: Etiqueta para un campo de formulario.

---------------------------------------------------------------------------

id: 	Identificador único para CSS o JavaScript.

class:		Identificador para grupos de elementos (CSS).

src	<img>, <video>	Ruta del archivo (fuente).

href	<a>	Dirección del enlace (URL).

alt	<img>	Texto alternativo si la imagen no carga.

style	Todas	Permite poner CSS directo (no recomendado, pero útil).

target="_blank"	<a>	Abre el enlace en una pestaña nueva.

placeholder	<input>	Texto de ayuda dentro de una caja de texto.

autoplay / muted	<video>	Controlan la reproducción automática.

-----------------------------------------------------------------------------

<meta charset="UTF-8">: Permite usar tildes y la letra "ñ".

<meta name="viewport" content="...">: Hace que tu web se vea bien en móviles (Responsive Design).

<title>: El nombre que aparece en la pestaña del navegador.


-----------------------------------------------------------------------------

text	Nombre del usuario o nombre de la figura.
email	Correo electrónico (valida automáticamente el @).
password	Contraseña (oculta los caracteres con puntos).
number	Cantidad de figuras a comprar.
date	Fecha de nacimiento o fecha de lanzamiento.
checkbox	"Acepto términos y condiciones".
radio	Selección única (ej: Elegir método de pago: Visa o PayPal).
file	Subir una foto del producto.
submit	El botón de "Finalizar Compra".

-----------------------------------------------------------------------------

Atributos de Validación (Para evitar errores)
Estos atributos se ponen dentro de los <input> para controlar qué escribe el usuario:

required: Obliga al usuario a llenar el campo antes de enviar.

placeholder: Texto de ayuda que desaparece al escribir (ej: "Escribe tu nombre...").

value: Define un valor predeterminado.

min / max: Define el rango para números o fechas.

maxlength: Límite de caracteres (ej: máximo 8 para un DNI).

pattern: Permite usar Expresiones Regulares para validar formatos complejos (como un teléfono específico).

readonly: El usuario puede ver el dato pero no cambiarlo.

disabled: Desactiva el campo por completo.

--------------------------------------------------------------------------------

<form>: El contenedor principal. Todo lo que esté dentro se enviará al servidor.

<label>: Define una etiqueta para un elemento. Es vital para la accesibilidad y permite que, al hacer clic en el texto, se active el campo.

<input>: El elemento más versátil. Cambia su función según el atributo type.

<textarea>: Para textos largos (como comentarios o una dirección de envío).

<select>: Crea una lista desplegable.

<option>: Define cada opción dentro de un <select>.

<button>: El botón para enviar (type="submit") o reiniciar (type="reset") el formulario.

<fieldset>: Agrupa elementos relacionados dentro de un formulario (ej: "Datos Personales").

<legend>: Le da un título al grupo creado por <fieldset>.
















    
</body>
</html>
